name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Compile scripts
        run: |
          python -m py_compile scripts/*.py

      - name: Site plan smoke tests
        run: |
          python scripts/site_plan.py docs/SITE_CONFIG_EXAMPLE.json --format json
          python scripts/site_plan.py docs/SITE_CONFIG_EXISTING_SEO_EXAMPLE.json --format json || true
          python scripts/site_plan.py docs/SITE_CONFIG_REFERENCE_CLONE_EXAMPLE.json --format json

      - name: CSV inspector smoke test
        run: |
          python scripts/inspect_product_csv.py docs/SAMPLE_PRODUCT_IMPORT.csv

      - name: Product price currency conversion smoke test
        run: |
          python scripts/convert_product_prices.py docs/SAMPLE_PRODUCT_IMPORT.csv --output tmp-products-converted.csv --source-currency USD --target-currency EUR --rate 0.92 --rate-source "ci smoke test" --rate-timestamp "2026-07-09T00:00:00Z"
          test -s tmp-products-converted.csv
          rm tmp-products-converted.csv

      - name: Rank Math audit smoke test
        run: |
          python scripts/rank_math_content_audit.py docs/SAMPLE_RANK_MATH_META_MAP.json

      - name: Rank Math writer generation smoke test
        run: |
          python scripts/rank_math_meta_writer.py docs/SAMPLE_RANK_MATH_META_MAP.json --output tmp-rank-math-writer.php
          test -s tmp-rank-math-writer.php
          rm tmp-rank-math-writer.php

      - name: Reference site capture multi-page smoke test
        run: |
          python scripts/reference_capture_fixture_smoke.py

      - name: Secret scan
        run: |
          python scripts/secret_scan.py .
